<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIGIL Popup</title>
  <style>
    body {
      width: 320px;
      padding: 0;
      margin: 0;
      overflow-x: hidden;
    }
    
    .popup-container {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .popup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .popup-title {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }

    .status-badge {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 4px 8px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-badge.active {
      background-color: #EBF3F3;
      color: var(--accent-productive);
    }
    .status-badge.active::before {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--accent-productive);
    }

    .status-badge.inactive {
      background-color: var(--bg-secondary);
      color: var(--text-muted);
    }
    .status-badge.inactive::before {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--text-muted);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .metric-item {
      background-color: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 12px 8px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .metric-label {
      font-size: 0.6875rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .metric-val {
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--text-primary);
      font-weight: 500;
    }

    .actions-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .action-btn {
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
      border-radius: 6px;
      transition: background-color 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-btn:hover {
      background-color: var(--bg-secondary);
    }

    .action-btn.danger {
      color: var(--accent-distracting);
    }

    .action-icon {
      color: var(--text-muted);
      font-size: 1rem;
    }
    .action-btn.danger .action-icon {
      color: var(--accent-distracting);
      opacity: 0.8;
    }
    
    .tracking-toggle {
      width: 100%;
      margin-top: 8px;
      background-color: var(--text-primary);
      color: var(--bg-primary);
      text-align: center;
      justify-content: center;
      padding: 12px;
      border-radius: 8px;
      font-weight: 500;
    }
    .tracking-toggle:hover {
      opacity: 0.9;
    }
    .tracking-toggle.stop {
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-strong);
    }

  </style>
  <script type="module" crossorigin src="./assets/popup-Czzlg-qk.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/analytics-DxEBoN6Y.js">
  <link rel="stylesheet" crossorigin href="./assets/popup-DhT7GNkx.css">
</head>
<body>
  <div class="popup-container">
    
    <div class="popup-header">
      <div class="popup-title">VIGIL</div>
      <div id="statusBadge" class="status-badge inactive">Inactive</div>
    </div>

    <div class="metrics-grid">
      <div class="metric-item">
        <div class="metric-label">Focus</div>
        <div id="valFocus" class="metric-val">--</div>
      </div>
      <div class="metric-item">
        <div class="metric-label">Deep Work</div>
        <div id="valDeepWork" class="metric-val">--</div>
      </div>
      <div class="metric-item">
        <div class="metric-label">Switches</div>
        <div id="valSwitches" class="metric-val">--</div>
      </div>
    </div>

    <button id="trackingBtn" class="action-btn tracking-toggle">
      Start Tracking
    </button>

    <div class="actions-list">
      <button id="dashboardBtn" class="action-btn">
        <span class="action-icon">↗</span> Open Dashboard
      </button>
      <button id="exportBtn" class="action-btn">
        <span class="action-icon">↓</span> Export Data
      </button>
      <button id="clearBtn" class="action-btn danger">
        <span class="action-icon">✕</span> Clear Data
      </button>
    </div>

  </div>

</body>
</html>
